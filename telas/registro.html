<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoodleCraft S.A.</title>
    <link rel="stylesheet" href="../estilos/registro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
            <h1><img src="../img/noodle.png" alt="NoodleCraft S.A." style="height: 50px;"> NoodleCraft S.A.</h1>

             <nav>
                <a href="../index.html">Voltar</a>
                <a href="../index.html">Finalizar Seção</a>
            </nav>
    </header>
    <div class="container">
        <main>
            <form action="enviar.php" method="post">
                <h1>Abrir Pedido de Manutenção</h1>
                <div class="form-data">
                    <label for="tempo">Dia e Horario:</label>
                    <input type="datetime-local" id="tempo" name="tempo">
                </div>
                <div class="form-nome">
                    <label for="nome">Digite seu nome:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-nome">
                    <label for="RA">Digite seu RA:</label>
                    <input type="number" id="RA" name="RA" required inputmode="numeric" pattern="[0-9]*">
                </div>
                <div class="form-select">
                    <label for="maquinario">Qual Maquina?</label>
                    <select id="maquinario" name="maquinario" required>
                        <option value="" disabled selected>Selecione sua máquina</option>
                        <option value="maquina1">Batedeira</option>
                        <option value="maquina2">Laminadora</option>
                        <option value="maquina3">Cortador Ondulador</option>
                        <option value="maquina4">Cozinhador a vapor</option>
                        <option value="maquina5">Maquina de fritura</option>
                    </select>
                </div>
                <p>Continua operando?</p>
                <div class="form-nome">
                    <input type="radio" id="Sim" name="tipo" value="sim">
                    <label for="Sim">Sim</label>
                    <input type="radio" id="Nao" name="tipo" value="nao">
                    <label for="Nao">Não</label>
                </div>

                <div class="form-nome">
                    <label for="mensagem">Descreva o problema:</label>
                    <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar</button>
                <button type="reset" class="btn-submit">Limpar formulario</button>

            </form>    


        </main>
    </div>
    
</body>
</html>
